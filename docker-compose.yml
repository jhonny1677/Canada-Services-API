version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: canada_services_db
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - canada_services_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  canada_services_data:
